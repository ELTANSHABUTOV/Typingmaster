<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <title>Profilini Tamamla</title>
  <style>
    body{ background:#0f172a; color:white; font-family:sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; }
    .card{ background:#1e293b; padding:30px; border-radius:15px; width:300px; display:flex; flex-direction:column; gap:15px; }
    input{ padding:10px; border-radius:5px; border:none; }
    button{ padding:10px; background:green; color:white; border:none; cursor:pointer; font-weight:bold; }
  </style>
</head>
<body>
  <div class="card">
    <h3>Məlumatları daxil et</h3>
    <input type="text" id="name" placeholder="Ad">
    <input type="text" id="surname" placeholder="Soyad">
    <button id="saveBtn">Yadda Saxla</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyCYWC8P0meXFbyRoSA4uHkJmJRkPFlhwSQ", authDomain: "salam-58d0a.firebaseapp.com", projectId: "salam-58d0a", storageBucket: "salam-58d0a.firebasestorage.app", messagingSenderId: "703442504339", appId: "1:703442504339:web:f9a6b1f54db80c4c829b66" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    document.getElementById("saveBtn").onclick = async () => {
      const user = auth.currentUser;
      const n = document.getElementById("name").value.trim();
      const s = document.getElementById("surname").value.trim();
      
      if(!user || !n || !s) return alert("Boşluqları doldurun");

      await setDoc(doc(db, "melumatlar", user.uid), {
        uid: user.uid, email: user.email, name: n, surname: s, createdAt: serverTimestamp()
      });
      window.location.href = "account.html";
    };
  </script>
</body>
</html>
