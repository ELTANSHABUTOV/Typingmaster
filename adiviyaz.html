<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Profilini Tamamla</title>
    <style>
        body { background: #0b0f19; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; margin: 0; }
        .card { background: #1e293b; padding: 40px; border-radius: 24px; width: 320px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #334155; background: #0b0f19; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #00d2ff; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Profilini Tamamla</h3>
        <p style="font-size: 0.8rem; color: #94a3b8;">Xoş gəldin! Ad və soyadını qeyd et.</p>
        <input type="text" id="ad" placeholder="Adınız">
        <input type="text" id="soyad" placeholder="Soyadınız">
        <button id="saveBtn">Davam Et</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCYWC8P0meXFbyRoSA4uHkJmJRkPFlhwSQ", authDomain: "salam-58d0a.firebaseapp.com", projectId: "salam-58d0a", storageBucket: "salam-58d0a.firebasestorage.app", messagingSenderId: "703442504339", appId: "1:703442504339:web:f9a6b1f54db80c4c829b66" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById("saveBtn").onclick = async () => {
            const user = auth.currentUser;
            const ad = document.getElementById("ad").value.trim();
            const soyad = document.getElementById("soyad").value.trim();
            if(!user || !ad || !soyad) return alert("Boşluqları doldurun!");

            await setDoc(doc(db, "melumatlar", user.uid), {
                uid: user.uid, email: user.email, name: ad, surname: soyad, createdAt: serverTimestamp()
            });
            window.location.href = "account.html";
        };
    </script>
</body>
</html>
