<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <title>Məlumatları Tamamla</title>
  <style>
    body { margin: 0; font-family: Poppins, sans-serif; background: #0f172a; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #020617; padding: 30px; border-radius: 16px; width: 320px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #1e293b; background: #0f172a; color: #fff; box-sizing: border-box; }
    button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #22c55e; color: #000; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <div class="card">
    <h2 style="text-align:center">Profilini Tamamla</h2>
    <input type="text" id="nameInput" placeholder="Adınız">
    <input type="text" id="surnameInput" placeholder="Soyadınız">
    <button id="saveBtn">Yadda Saxla</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCYWC8P0meXFbyRoSA4uHkJmJRkPFlhwSQ",
      authDomain: "salam-58d0a.firebaseapp.com",
      projectId: "salam-58d0a",
      storageBucket: "salam-58d0a.firebasestorage.app",
      messagingSenderId: "703442504339",
      appId: "1:703442504339:web:f9a6b1f54db80c4c829b66"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let uid = null;
    let email = "";

    onAuthStateChanged(auth, (user) => {
      if (!user) window.location.href = "index.html";
      uid = user.uid;
      email = user.email;
    });

    document.getElementById("saveBtn").addEventListener("click", async () => {
      const name = document.getElementById("nameInput").value.trim();
      const surname = document.getElementById("surnameInput").value.trim();

      if (!name || !surname) return alert("Boşluqları doldurun!");

      try {
        await setDoc(doc(db, "melumatlar", uid), {
          name, surname, email, createdAt: serverTimestamp()
        });
        window.location.href = "account.html";
      } catch (e) { alert("Xəta baş verdi"); }
    });
  </script>
</body>
</html>
