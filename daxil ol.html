<!DOCTYPE html>
<html lang="az">
<head>
    <meta name="google-adsense-account" content="ca-pub-5663281315926059">
    <meta charset="UTF-8">
    <title>Daxil Ol - OTP Doğrulama</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        body { background: #0b0f19; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; }
        .card { background: rgba(30, 41, 59, 0.7); padding: 40px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); width: 360px; text-align: center; backdrop-filter: blur(20px); }
        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 20px; outline: none; box-sizing: border-box; }
        .otp-inputs { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .otp-field { width: 50px; height: 60px; text-align: center; font-size: 1.8rem; background: #0f172a; border: 2px solid #334155; border-radius: 12px; color: #00d2ff; }
        button { width: 100%; padding: 14px; border-radius: 12px; border: none; background: #00d2ff; color: #0b0f19; font-weight: 700; cursor: pointer; transition: 0.3s; }
        button:disabled { background: #334155; cursor: not-allowed; color: #94a3b8; }
        #timer { color: #ff4757; font-weight: 600; margin: 15px 0; font-size: 0.9rem; }
        .resend { cursor: pointer; color: #00d2ff; text-decoration: underline; display: none; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <div id="emailView">
            <h2>Xoş Gəldiniz</h2>
            <p style="color:#94a3b8">Daxil olmaq üçün emailinizi yazın</p>
            <input type="email" id="email" placeholder="Email ünvanı">
            <button id="sendBtn">Kodu Göndər</button>
        </div>

        <div id="otpView" style="display:none">
            <h2>Kodu Doğrulayın</h2>
            <div id="timer">⏳ Qalan vaxt: 01:00</div>
            <div class="otp-inputs">
                <input type="text" class="otp-field" maxlength="1">
                <input type="text" class="otp-field" maxlength="1">
                <input type="text" class="otp-field" maxlength="1">
                <input type="text" class="otp-field" maxlength="1">
            </div>
            <button id="verifyBtn">Təsdiqlə</button>
            <div id="resendBtn" class="resend">Kodu yenidən göndər</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCYWC8P0meXFbyRoSA4uHkJmJRkPFlhwSQ", authDomain: "salam-58d0a.firebaseapp.com", projectId: "salam-58d0a", storageBucket: "salam-58d0a.firebasestorage.app", messagingSenderId: "703442504339", appId: "1:703442504339:web:f9a6b1f54db80c4c829b66" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        emailjs.init("57Dy9aY2JxE2QQ9dL");

        let generatedCode = "";
        let timer;
        const otpFields = document.querySelectorAll('.otp-field');

        // OTP Fokus Məntiqi
        otpFields.forEach((f, i) => {
            f.onkeyup = (e) => {
                if(f.value && i<3) otpFields[i+1].focus();
                if(e.key === "Backspace" && i>0) otpFields[i-1].focus();
            }
        });

        async function startTimer() {
            let sec = 60;
            document.getElementById("resendBtn").style.display = "none";
            document.getElementById("verifyBtn").disabled = false;
            clearInterval(timer);
            timer = setInterval(() => {
                sec--;
                document.getElementById("timer").innerText = `⏳ Qalan vaxt: 00:${sec < 10 ? '0' + sec : sec}`;
                if (sec <= 0) {
                    clearInterval(timer);
                    document.getElementById("timer").innerText = "⛔ Vaxt bitdi!";
                    document.getElementById("verifyBtn").disabled = true;
                    document.getElementById("resendBtn").style.display = "block";
                }
            }, 1000);
        }

        const sendOTP = async () => {
            const email = document.getElementById("email").value.trim().toLowerCase();
            const q = query(collection(db, "melumatlar"), where("email", "==", email));
            const snap = await getDocs(q);

            if (snap.empty) {
                alert("Email tapılmadı! Qeydiyyata yönləndirilirsiniz.");
                window.location.href = "qeydiyyat.html";
                return;
            }

            generatedCode = Math.floor(1000 + Math.random() * 9000).toString();
            await emailjs.send("service_v54lvys", "template_fcigrcp", { email, passcode: generatedCode });
            localStorage.setItem("tempEmail", email);
            document.getElementById("emailView").style.display = "none";
            document.getElementById("otpView").style.display = "block";
            startTimer();
        };

        document.getElementById("sendBtn").onclick = sendOTP;
        document.getElementById("resendBtn").onclick = sendOTP;

        document.getElementById("verifyBtn").onclick = () => {
            const code = Array.from(otpFields).map(f => f.value).join("");
            if (code === generatedCode) {
                window.location.href = "account.html";
            } else { alert("Kod səhvdir!"); }
        };
    </script>
</body>
</html>
