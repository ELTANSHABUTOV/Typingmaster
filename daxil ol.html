<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <title>Daxil ol - OTP</title>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>
    body{ margin:0; font-family:'Poppins', sans-serif; display:flex; height:100vh; background:#f0f0f0; }
    .login-side{ background:yellowgreen; width:400px; padding:40px; color:#fff; display:flex; flex-direction:column; justify-content:center; gap:20px; }
    input{ padding:12px; border-radius:10px; border:none; width:100%; box-sizing:border-box; }
    button{ padding:12px; border-radius:20px; cursor:pointer; border:none; background:white; font-weight:bold; }
    .otp-inputs{ display:flex; gap:10px; justify-content:center; }
    .otp-input{ width:40px; height:40px; text-align:center; font-size:20px; color:#000; }
  </style>
</head>
<body>
  <div class="login-side">
    <h2>Daxil ol</h2>
    <div id="emailStep">
      <input type="email" id="emailInput" placeholder="Emailinizi daxil edin">
      <button id="sendBtn" style="margin-top:15px">Kodu Göndər</button>
    </div>
    <div id="otpStep" style="display:none">
      <p>Kod emailinizə göndərildi</p>
      <div class="otp-inputs">
        <input type="text" class="otp-input" maxlength="1">
        <input type="text" class="otp-input" maxlength="1">
        <input type="text" class="otp-input" maxlength="1">
        <input type="text" class="otp-input" maxlength="1">
      </div>
      <button id="verifyBtn" style="margin-top:15px">Təsdiqlə</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCYWC8P0meXFbyRoSA4uHkJmJRkPFlhwSQ",
      authDomain: "salam-58d0a.firebaseapp.com",
      projectId: "salam-58d0a",
      storageBucket: "salam-58d0a.firebasestorage.app",
      messagingSenderId: "703442504339",
      appId: "1:703442504339:web:f9a6b1f54db80c4c829b66"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    emailjs.init("57Dy9aY2JxE2QQ9dL");

    let correctCode = "";

    document.getElementById("sendBtn").onclick = async () => {
      const email = document.getElementById("emailInput").value.trim().toLowerCase();
      const q = query(collection(db, "melumatlar"), where("email", "==", email));
      const snap = await getDocs(q);

      if (snap.empty) {
        alert("Bu email bazada yoxdur! Qeydiyyata yönləndirilirsiniz.");
        window.location.href = "index.html";
        return;
      }

      correctCode = Math.floor(1000 + Math.random() * 9000).toString();
      await emailjs.send("service_v54lvys", "template_fcigrcp", { email: email, passcode: correctCode });
      
      localStorage.setItem("tempEmail", email);
      document.getElementById("emailStep").style.display = "none";
      document.getElementById("otpStep").style.display = "block";
    };

    document.getElementById("verifyBtn").onclick = () => {
      const entered = Array.from(document.querySelectorAll(".otp-input")).map(i => i.value).join("");
      if (entered === correctCode) {
        window.location.href = "account.html";
      } else { alert("Kod səhvdir!"); }
    };
  </script>
</body>
</html>
