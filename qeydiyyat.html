<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <title>TypingMaster - Qeydiyyat</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body{ display:flex; margin:0; height:100vh; font-family:'Poppins', sans-serif; overflow:hidden; }
    .esas{ background-color:aqua; width:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; }
    .picture{ width:50%; } .picture img{ width:100%; height:100vh; object-fit:cover; }
    button{ padding:15px 25px; border-radius:20px; border:none; cursor:pointer; font-size:18px; display:flex; align-items:center; gap:10px; transition: 0.3s; }
    button:hover{ transform: scale(1.05); background: #eee; }
    a{ color: chocolate; font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>
  <div class="esas">
    <h2 style="text-align:center; padding:0 20px;">TypingMaster ilə klaviatura bacarığını inkişaf etdir!</h2>
    <button id="googleBtn">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
      <span>Google ilə Qeydiyyat</span>
    </button>
    <h4>Hesabın var? <a href="login.html">Daxil ol</a></h4>
  </div>
  <div class="picture"><img src="https://cdn.mos.cms.futurecdn.net/3kQCtpnfHoUq5cBsLqKTFk.jpg"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCYWC8P0meXFbyRoSA4uHkJmJRkPFlhwSQ",
      authDomain: "salam-58d0a.firebaseapp.com",
      projectId: "salam-58d0a",
      storageBucket: "salam-58d0a.firebasestorage.app",
      messagingSenderId: "703442504339",
      appId: "1:703442504339:web:f9a6b1f54db80c4c829b66"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    document.getElementById("googleBtn").onclick = async () => {
      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        const userRef = doc(db, "melumatlar", user.uid);
        const snap = await getDoc(userRef);

        if (snap.exists()) {
          alert("Hesab artıq mövcuddur! Hesaba keçid edilir...");
          window.location.href = "account.html";
        } else {
          window.location.href = "adiviyaz.html";
        }
      } catch (err) { alert(err.message); }
    };
  </script>
</body>
</html>
