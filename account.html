<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <title>Mənim Hesabım</title>
  <style>
    body{ background:#0f172a; color:white; font-family:sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; }
    .card{ background:#020617; padding:30px; border-radius:15px; width:350px; text-align:center; }
    .btn{ padding:10px; margin:5px; border-radius:5px; border:none; cursor:pointer; width:100%; font-weight:bold; }
    .davam{ background:blue; color:white; }
    .cixis{ background:red; color:white; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Xoş gəldiniz</h2>
    <p id="uEmail"></p>
    <p id="uName"></p>
    <button class="btn davam" onclick="window.location.href='main-index.html'">Davam et</button>
    <button class="btn cixis" id="logout">Çıxış et</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyCYWC8P0meXFbyRoSA4uHkJmJRkPFlhwSQ", authDomain: "salam-58d0a.firebaseapp.com", projectId: "salam-58d0a", storageBucket: "salam-58d0a.firebasestorage.app", messagingSenderId: "703442504339", appId: "1:703442504339:web:f9a6b1f54db80c4c829b66" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
      let email = user ? user.email : localStorage.getItem("tempEmail");
      if (!email) { window.location.href = "index.html"; return; }

      const q = query(collection(db, "melumatlar"), where("email", "==", email));
      const snap = await getDocs(q);
      
      snap.forEach(doc => {
        document.getElementById("uEmail").textContent = "Email: " + doc.data().email;
        document.getElementById("uName").textContent = "Ad: " + doc.data().name + " " + doc.data().surname;
      });
    });

    document.getElementById("logout").onclick = () => {
      signOut(auth);
      localStorage.clear();
      window.location.href = "index.html";
    };
  </script>
</body>
</html>
