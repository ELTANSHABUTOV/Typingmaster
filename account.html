<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Hesabım - TypingMaster</title>
    <style>
        body { background: #0b0f19; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; margin: 0; }
        .card { background: linear-gradient(145deg, #1e293b, #0f172a); padding: 40px; border-radius: 30px; width: 380px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .avatar { width: 90px; height: 90px; background: #00d2ff; border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; color: #0b0f19; font-weight: 800; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; text-decoration: none; }
        .btn-go { background: #00d2ff; color: #0b0f19; }
        .btn-out { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; }
    </style>
</head>
<body>
    <div class="card" id="profile" style="display:none">
        <div class="avatar" id="avatarText">TM</div>
        <h2 id="fullName" style="margin:5px 0">Yüklənir...</h2>
        <p id="emailText" style="color:#94a3b8; margin-bottom:30px"></p>
        <button class="btn btn-go" onclick="window.location.href='index-master.html'">Yazmağa Başla</button>
        <button class="btn btn-out" id="logout">Çıxış Et</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCYWC8P0meXFbyRoSA4uHkJmJRkPFlhwSQ", authDomain: "salam-58d0a.firebaseapp.com", projectId: "salam-58d0a", storageBucket: "salam-58d0a.firebasestorage.app", messagingSenderId: "703442504339", appId: "1:703442504339:web:f9a6b1f54db80c4c829b66" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            let email = user ? user.email : localStorage.getItem("tempEmail");
            if (!email) return window.location.href = "qeydiyyat.html";

            const q = query(collection(db, "melumatlar"), where("email", "==", email));
            const snap = await getDocs(q);
            
            if(!snap.empty) {
                const data = snap.docs[0].data();
                document.getElementById("fullName").innerText = data.name + " " + data.surname;
                document.getElementById("emailText").innerText = data.email;
                document.getElementById("avatarText").innerText = data.name[0] + data.surname[0];
                document.getElementById("profile").style.display = "block";
            } else {
                window.location.href = "adiviyaz.html";
            }
        });

        document.getElementById("logout").onclick = () => {
            signOut(auth);
            localStorage.clear();
            window.location.href = "qeydiyyat.html";
        };
    </script>
</body>
</html>
