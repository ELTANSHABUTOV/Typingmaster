<!doctype html>
<html lang="az">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5663281315926059" crossorigin="anonymous"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TypingMaster — Professional Yazı Təcrübəsi</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg1: #0f172a; --bg2: #07103a; --card: rgba(30, 41, 59, 0.7); --accent: #00d2ff; --glass: rgba(255, 255, 255, 0.05); --muted: rgba(255, 255, 255, 0.5); }
    body { margin: 0; background: linear-gradient(135deg, var(--bg1), var(--bg2)); color: #f8fafc; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-x: hidden; }
    .container { width: 100%; max-width: 1000px; }
    .main-card { background: var(--card); backdrop-filter: blur(15px); border-radius: 24px; padding: 30px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--glass); padding-bottom: 15px; }
    .user-section { display: flex; gap: 15px; align-items: center; }
    .user-section a { color: var(--muted); text-decoration: none; font-weight: 600; font-size: 14px; transition: 0.3s; }
    .user-section a:hover { color: var(--accent); }
    .stats-bar { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat-box { background: var(--glass); padding: 12px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); flex: 1; min-width: 120px; text-align: center; }
    .stat-box span { color: var(--accent); font-weight: 800; font-size: 1.2rem; display: block; }
    .word-stream { background: rgba(0,0,0,0.2); border-radius: 15px; padding: 25px; min-height: 120px; display: flex; flex-wrap: wrap; gap: 12px; font-size: 22px; line-height: 1.6; margin-bottom: 20px; user-select: none; }
    .word { color: var(--muted); transition: 0.2s; padding: 2px 8px; border-radius: 6px; }
    .word.current { color: #fff; background: rgba(0, 210, 255, 0.2); border-bottom: 2px solid var(--accent); }
    .word.correct { color: #22c55e; }
    .word.wrong { color: #ef4444; text-decoration: line-through; }
    .input-area { display: flex; gap: 15px; }
    input[type="text"] { flex: 1; background: #0f172a; border: 2px solid #334155; border-radius: 12px; padding: 15px; color: white; font-size: 18px; outline: none; transition: 0.3s; }
    input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 210, 255, 0.2); }
    .btn { padding: 12px 25px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; font-family: inherit; }
    .btn-primary { background: var(--accent); color: #07103a; width: 150px; }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
    .modal-content { background: #1e293b; padding: 40px; border-radius: 24px; width: 100%; max-width: 450px; text-align: center; border: 1px solid rgba(0,210,255,0.3); }
    #wpm-highlight { font-size: 4rem; color: var(--accent); display: block; margin: 10px 0; font-weight: 800; }
  </style>
</head>
<body>

<div class="container">
  <div class="main-card">
    <header>
      <div style="display:flex; align-items:center; gap:12px;">
        <img src="https://i.postimg.cc/9Qy6YWFZ/Chat-GPT-Image-Nov-27-2025-09-35-45-PM.png" width="45" style="border-radius:8px">
        <h2 style="margin:0; font-size:1.4rem; letter-spacing: -0.5px;">TypingMaster</h2>
      </div>
      <div class="user-section">
        <a href="account.html" id="userDisplayName">Hesab</a>
        <a href="telefon.html">Əlaqə</a>
        <a href="#" id="logoutBtn" style="color:#ef4444">Çıxış</a>
      </div>
    </header>

    <div class="stats-bar">
      <div class="stat-box">WPM <span id="wpmDisplay">0</span></div>
      <div class="stat-box">DÜZ <span id="correctDisplay">0</span></div>
      <div class="stat-box">SƏHV <span id="wrongDisplay">0</span></div>
      <div class="stat-box">VAXT <span id="timerDisplay">00:00</span></div>
    </div>

    <div class="word-stream" id="wordBox"></div>

    <div class="input-area">
      <input type="text" id="mainInput" placeholder="Sözləri yazın..." disabled autocomplete="off">
      <button class="btn btn-primary" id="startAction">BAŞLA</button>
    </div>
  </div>
</div>

<div id="resultModal" class="modal">
  <div class="modal-content">
    <h2 style="margin:0">Nəticə</h2>
    <strong id="wpm-highlight">0</strong>
    <p style="color:var(--muted)">Söz / Dəqiqə (WPM)</p>
    <div style="display:flex; justify-content: space-around; margin: 20px 0;">
        <div>Düz: <b id="finalCorrect" style="color:#22c55e">0</b></div>
        <div>Səhv: <b id="finalWrong" style="color:#ef4444">0</b></div>
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="location.reload()">Yenidən Başla</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = { 
    apiKey: "AIzaSyCPUyl6EbO8dvJBTWofVBQg1a1xJHM4_08", 
    authDomain: "salam-58d0a.firebaseapp.com", 
    projectId: "salam-58d0a", 
    storageBucket: "salam-58d0a.firebasestorage.app", 
    messagingSenderId: "703442504339", 
    appId: "1:703442504339:web:4d7757d08bb37189829b66" 
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  const wordPool = "salam dünya kitab klaviatura sürət texnologiya məktəb həyat proqramist uğur gələcək internet məlumat inkişaf azərbaycan musiqi günəş ulduz dəniz qələm dəftər paytaxt elm oyun yazı funksiya sistem kod ekran".split(" ");
  let state = { words: [], currentIdx: 0, correct: 0, wrong: 0, startTime: null, isActive: false };
  let currentUser = null;

  const inputEl = document.getElementById("mainInput");
  const wordBox = document.getElementById("wordBox");

  onAuthStateChanged(auth, (user) => {
    currentUser = user;
    if (user) {
      document.getElementById("userDisplayName").innerText = user.email.split('@')[0];
      saveVisitorEntry(user);
    }
  });

  async function saveVisitorEntry(user) {
    try {
      const email = user?.email || localStorage.getItem("tempEmail");
      if (!email) return;
      await setDoc(doc(db, "visitors", `${email}_${Date.now()}`), {
        email, name: user?.displayName || email.split("@")[0], page: "home", visitedAt: serverTimestamp(), userAgent: navigator.userAgent
      });
    } catch (err) { console.error("Visitor error:", err); }
  }

  function initGame() {
    state.words = [...wordPool].sort(() => Math.random() - 0.5).slice(0, 30);
    state.currentIdx = 0; state.correct = 0; state.wrong = 0;
    state.isActive = true; state.startTime = Date.now();
    inputEl.disabled = false; inputEl.value = ""; inputEl.focus();
    renderWords(); startTimer();
  }

  function renderWords() {
    wordBox.innerHTML = state.words.map((w, i) => `<span class="word ${i === state.currentIdx ? 'current' : ''}">${w}</span>`).join("");
  }

  function startTimer() {
    const timerInt = setInterval(() => {
      if (!state.isActive) return clearInterval(timerInt);
      const elapsed = Math.floor((Date.now() - state.startTime) / 1000);
      document.getElementById("timerDisplay").innerText = `${Math.floor(elapsed/60).toString().padStart(2,'0')}:${(elapsed%60).toString().padStart(2,'0')}`;
      if(elapsed > 0) document.getElementById("wpmDisplay").innerText = Math.round(state.currentIdx / (elapsed / 60));
    }, 1000);
  }

  inputEl.addEventListener("input", (e) => {
    if (e.data === " ") {
      const typed = inputEl.value.trim();
      if (!typed) { inputEl.value = ""; return; }
      const target = state.words[state.currentIdx];
      const wordEls = document.querySelectorAll(".word");
      
      if (typed === target) { state.correct++; wordEls[state.currentIdx].classList.add("correct"); }
      else { state.wrong++; wordEls[state.currentIdx].classList.add("wrong"); }
      
      state.currentIdx++; inputEl.value = "";
      if (state.currentIdx >= state.words.length) endGame();
      else renderWords();
      
      document.getElementById("correctDisplay").innerText = state.correct;
      document.getElementById("wrongDisplay").innerText = state.wrong;
    }
  });

  async function endGame() {
    state.isActive = false; inputEl.disabled = true;
    const finalWpm = document.getElementById("wpmDisplay").innerText;
    document.getElementById("wpm-highlight").innerText = finalWpm;
    document.getElementById("finalCorrect").innerText = state.correct;
    document.getElementById("finalWrong").innerText = state.wrong;
    document.getElementById("resultModal").style.display = "flex";

    const email = currentUser?.email || localStorage.getItem("tempEmail");
    if (email) {
      await setDoc(doc(db, "results", `${email}_${Date.now()}`), {
        email, wpm: parseInt(finalWpm), correct: state.correct, wrong: state.wrong, createdAt: serverTimestamp()
      });
    }
  }

  document.getElementById("startAction").onclick = () => {
    if (currentUser || localStorage.getItem("tempEmail") || localStorage.getItem("userEmail")) {
      initGame();
      document.getElementById("startAction").style.display = "none";
    } else {
      alert("Oyuna başlamaq üçün qeydiyyatdan keçməlisiniz!");
      window.location.href = "qeydiyyat.html";
    }
  };

  document.getElementById("logoutBtn").onclick = (e) => {
    e.preventDefault();
    signOut(auth).then(() => {
      localStorage.clear();
      window.location.href = "qeydiyyat.html";
    });
  };
</script>
</body>
</html>
