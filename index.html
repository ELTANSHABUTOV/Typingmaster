<!doctype html>
<html lang="az">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5663281315926059" crossorigin="anonymous"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TypingMaster — Professional Yazı Platforması</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { 
      --bg: #0b0f19; --card-bg: rgba(22, 30, 46, 0.8); 
      --accent: #00d2ff; --text: #f8fafc; --muted: #94a3b8;
      --error: #ef4444; --success: #22c55e;
    }
    
    * { box-sizing: border-box; transition: all 0.3s ease; }
    
    body { 
      margin: 0; background: var(--bg); color: var(--text); 
      font-family: 'Poppins', sans-serif; display: flex; flex-direction: column; 
      align-items: center; min-height: 100vh; overflow-x: hidden;
    }

    .container { width: 100%; max-width: 1000px; padding: 20px; animation: fadeInUp 0.8s ease-out; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .main-card { 
      background: var(--card-bg); backdrop-filter: blur(20px); 
      border-radius: 28px; padding: 35px; border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
    }

    header { 
      display: flex; justify-content: space-between; align-items: center; 
      margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; 
    }

    .user-section { display: flex; gap: 15px; align-items: center; }
    .user-section a { 
      color: var(--accent); text-decoration: none; font-weight: 600; 
      font-size: 14px; padding: 8px 12px; border-radius: 10px; background: rgba(0, 210, 255, 0.1);
    }
    .user-section a#logoutBtn { background: rgba(239, 68, 68, 0.1); color: var(--error); display: none; }
    .user-section a:hover { filter: brightness(1.2); }

    .stats-bar { display: flex; gap: 15px; margin-bottom: 25px; }
    .stat-box { 
      background: rgba(0,0,0,0.3); padding: 15px; border-radius: 18px; 
      flex: 1; text-align: center; border: 1px solid rgba(255,255,255,0.03);
    }
    .stat-box span { color: var(--accent); font-weight: 800; font-size: 1.4rem; display: block; }

    .word-stream { 
      background: rgba(0,0,0,0.4); border-radius: 20px; padding: 30px; 
      min-height: 140px; display: flex; flex-wrap: wrap; gap: 12px; 
      font-size: 24px; line-height: 1.6; margin-bottom: 25px; user-select: none;
    }
    .word { color: var(--muted); padding: 2px 8px; border-radius: 8px; border-bottom: 2px solid transparent; }
    .word.current { color: #fff; background: rgba(255, 255, 255, 0.05); border-bottom-color: var(--accent); }
    .word.correct { color: var(--success); }
    .word.wrong { color: var(--error); }
    
    .char-correct { color: var(--success); }
    .char-wrong { color: var(--error); text-decoration: underline; }

    .input-area { display: flex; gap: 15px; }
    input[type="text"] { 
      flex: 1; background: #0b0f19; border: 2px solid #1e293b; border-radius: 15px; 
      padding: 18px; color: white; font-size: 18px; outline: none;
    }

    .btn { 
      padding: 15px 35px; border-radius: 15px; border: none; 
      font-weight: 700; cursor: pointer; background: var(--accent); color: var(--bg);
    }

    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 2000; }
    .modal-content { 
      background: #161e2e; padding: 40px; border-radius: 30px; 
      width: 100%; max-width: 450px; text-align: center; border: 1px solid var(--accent);
    }
    .final-stats { display: flex; justify-content: space-around; margin: 25px 0; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 15px; }
    .final-stat-item b { display: block; font-size: 1.5rem; }
  </style>
</head>
<body>

<div class="container">
  <div class="main-card">
    <header>
      <div style="display:flex; align-items:center; gap:12px;">
        <img src="https://i.postimg.cc/9Qy6YWFZ/Chat-GPT-Image-Nov-27-2025-09-35-45-PM.png" width="45" style="border-radius:10px">
        <h2 style="margin:0; font-size:1.5rem; background: linear-gradient(to right, #fff, #00d2ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">TypingMaster</h2>
      </div>
      <div class="user-section">
        <a href="account.html" id="userDisplayName">Hesab</a>
        <a href="telefon.html">Əlaqə</a>
        <a href="#" id="logoutBtn">Çıxış</a>
      </div>
    </header>

    <div class="stats-bar">
      <div class="stat-box">WPM <span id="wpmDisplay">0</span></div>
      <div class="stat-box">DÜZ <span id="correctDisplay">0</span></div>
      <div class="stat-box">SƏHV <span id="wrongDisplay">0</span></div>
      <div class="stat-box">VAXT <span id="timerDisplay">00:00</span></div>
    </div>

    <div class="word-stream" id="wordBox"></div>

    <div class="input-area">
      <input type="text" id="mainInput" placeholder="BAŞLA düyməsini sıxın..." disabled autocomplete="off">
      <button class="btn" id="startAction">BAŞLA</button>
    </div>
  </div>
</div>

<div id="resultModal" class="modal">
  <div class="modal-content">
    <h2>Məşq Bitdi!</h2>
    <span id="wpm-highlight" style="font-size: 4rem; color: var(--accent); font-weight: 800; display: block; margin: 10px 0;">0</span>
    <p style="color:var(--muted); margin-bottom: 20px;">Söz / Dəqiqə (WPM)</p>
    <div class="final-stats">
        <div class="final-stat-item"><span style="color: var(--success)">Düzgün</span><b id="finalCorrect" style="color: var(--success)">0</b></div>
        <div class="final-stat-item"><span style="color: var(--error)">Səhv</span><b id="finalWrong" style="color: var(--error)">0</b></div>
    </div>
    <button class="btn" style="width:100%" onclick="location.reload()">Yenidən Sına</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = { 
    apiKey: "AIzaSyCPUyl6EbO8dvJBTWofVBQg1a1xJHM4_08", authDomain: "salam-58d0a.firebaseapp.com", 
    projectId: "salam-58d0a", storageBucket: "salam-58d0a.firebasestorage.app", 
    messagingSenderId: "703442504339", appId: "1:703442504339:web:4d7757d08bb37189829b66" 
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  const wordPool = "salam dünya kitab klaviatura sürət texnologiya məktəb həyat proqramist uğur gələcək internet məlumat inkişaf azərbaycan musiqi günəş ulduz dəniz qələm dəftər".split(" ");
  let state = { words: [], currentIdx: 0, correct: 0, wrong: 0, startTime: null, isActive: false };
  let currentUser = null;

  const inputEl = document.getElementById("mainInput");
  const wordBox = document.getElementById("wordBox");
  const logoutBtn = document.getElementById("logoutBtn");

  state.words = [...wordPool].sort(() => Math.random() - 0.5).slice(0, 25);
  renderWords();

  onAuthStateChanged(auth, async (user) => {
    currentUser = user;
    if (user) {
      logoutBtn.style.display = "block"; // Daxil olubsa göstər
      const docRef = doc(db, "melumatlar", user.uid);
      const docSnap = await getDoc(docRef);
      if (docSnap.exists()) {
        const data = docSnap.data();
        document.getElementById("userDisplayName").innerText = `${data.name || ''} ${data.surname || ''}`.trim() || user.email.split('@')[0];
      } else {
        document.getElementById("userDisplayName").innerText = user.email.split('@')[0];
      }
    } else {
      logoutBtn.style.display = "none"; // Daxil olmayıbsa gizlə
      document.getElementById("userDisplayName").innerText = "Hesab";
    }
  });

  logoutBtn.onclick = (e) => {
    e.preventDefault();
    signOut(auth).then(() => { localStorage.clear(); window.location.href = "qeydiyyat.html"; });
  };

  function renderWords() {
    wordBox.innerHTML = state.words.map((w, i) => `<span class="word ${i === state.currentIdx ? 'current' : ''}">${w}</span>`).join("");
  }

  function initGame() {
    state.isActive = true; state.startTime = Date.now();
    inputEl.disabled = false; inputEl.placeholder = "Yazın..."; inputEl.focus();
    document.getElementById("startAction").style.display = "none";
    startTimer();
  }

  function startTimer() {
    const timer = setInterval(() => {
      if (!state.isActive) { clearInterval(timer); return; }
      const elapsed = Math.floor((Date.now() - state.startTime) / 1000);
      document.getElementById("timerDisplay").innerText = `${Math.floor(elapsed/60).toString().padStart(2,'0')}:${(elapsed%60).toString().padStart(2,'0')}`;
      if(elapsed > 0) document.getElementById("wpmDisplay").innerText = Math.round(state.currentIdx / (elapsed / 60));
    }, 1000);
  }

  inputEl.addEventListener("input", () => {
    const typed = inputEl.value;
    const target = state.words[state.currentIdx];
    const wordEls = document.querySelectorAll(".word");
    const currentEl = wordEls[state.currentIdx];

    let colored = "";
    for (let i = 0; i < target.length; i++) {
      if (i < typed.length) {
        colored += typed[i] === target[i] ? `<span class="char-correct">${target[i]}</span>` : `<span class="char-wrong">${target[i]}</span>`;
      } else colored += target[i];
    }
    currentEl.innerHTML = colored;
  });

  inputEl.addEventListener("keydown", (e) => {
    if (e.key === " ") {
      e.preventDefault();
      const typed = inputEl.value.trim();
      const target = state.words[state.currentIdx];
      const wordEls = document.querySelectorAll(".word");
      
      if (typed === target) {
        state.correct++;
        wordEls[state.currentIdx].className = "word correct";
      } else {
        state.wrong++;
        wordEls[state.currentIdx].className = "word wrong";
        wordEls[state.currentIdx].innerHTML = target;
      }

      state.currentIdx++;
      inputEl.value = "";
      if (state.currentIdx >= state.words.length) endGame();
      else {
        document.querySelectorAll(".word").forEach((el, i) => i === state.currentIdx ? el.classList.add("current") : el.classList.remove("current"));
      }
      
      document.getElementById("correctDisplay").innerText = state.correct;
      document.getElementById("wrongDisplay").innerText = state.wrong;
    }
  });

  async function endGame() {
    state.isActive = false; inputEl.disabled = true;
    document.getElementById("wpm-highlight").innerText = document.getElementById("wpmDisplay").innerText;
    document.getElementById("finalCorrect").innerText = state.correct;
    document.getElementById("finalWrong").innerText = state.wrong;
    document.getElementById("resultModal").style.display = "flex";
    
    if (currentUser) {
      await setDoc(doc(db, "results", `${currentUser.email}_${Date.now()}`), {
        email: currentUser.email, wpm: parseInt(document.getElementById("wpmDisplay").innerText), correct: state.correct, wrong: state.wrong, createdAt: serverTimestamp()
      });
    }
  }

  document.getElementById("startAction").onclick = () => initGame();
</script>
</body>
</html>
