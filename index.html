<!doctype html>
<html lang="az">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TypingMaster — Professional Yazı Platforması</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { 
      --bg: #0f172a; --card-bg: rgba(30, 41, 59, 0.7); 
      --accent: #38bdf8; --text: #f1f5f9; --muted: #94a3b8;
      --error: #f43f5e; --success: #10b981;
    }
    
    * { box-sizing: border-box; transition: all 0.2s ease; }
    
    body { 
      margin: 0; background: var(--bg); color: var(--text); 
      font-family: 'Poppins', sans-serif; height: 100vh;
      display: flex; flex-direction: column; align-items: center; overflow: hidden;
    }

    .app-container {
      flex: 1; display: flex; flex-direction: column; justify-content: center;
      width: 95%; max-width: 900px; padding: 20px;
    }

    /* Üst Menu */
    header { 
      display: flex; justify-content: space-between; align-items: center; 
      padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .brand { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .brand img { border-radius: 8px; width: 35px; }
    .brand h2 { margin: 0; font-size: 1.2rem; letter-spacing: 0.5px; }

    .nav-links { display: flex; gap: 10px; align-items: center; }
    .nav-links a { 
      color: var(--text); text-decoration: none; font-size: 13px; font-weight: 500;
      padding: 6px 14px; border-radius: 10px; background: rgba(255,255,255,0.05);
    }
    .nav-links a:hover { background: var(--accent); color: var(--bg); }
    .nav-links a#logoutBtn { color: var(--error); background: rgba(244, 63, 94, 0.1); display: none; }

    /* Oyun Kartı */
    .game-card { 
      background: var(--card-bg); backdrop-filter: blur(15px); 
      border-radius: 30px; padding: 30px; border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); margin-top: 20px;
    }

    .control-row { 
      display: flex; justify-content: space-between; align-items: center; 
      margin-bottom: 25px; gap: 20px;
    }

    .mode-selector { display: flex; background: rgba(0,0,0,0.3); padding: 4px; border-radius: 12px; }
    .mode-selector button { 
      background: transparent; border: none; color: var(--muted); padding: 6px 15px; 
      cursor: pointer; font-size: 13px; font-weight: 600; border-radius: 8px;
    }
    .mode-selector button.active { background: var(--accent); color: var(--bg); }

    .live-stats { display: flex; gap: 10px; }
    .stat-pill { background: rgba(0,0,0,0.2); padding: 6px 12px; border-radius: 10px; text-align: center; min-width: 70px; }
    .stat-pill label { display: block; font-size: 9px; color: var(--muted); text-transform: uppercase; }
    .stat-pill span { color: var(--accent); font-weight: 700; font-size: 1rem; }

    /* Söz Sahəsi */
    .word-display { 
      background: rgba(0,0,0,0.2); border-radius: 20px; padding: 25px; 
      height: 150px; display: flex; flex-wrap: wrap; gap: 12px; 
      font-size: 22px; line-height: 1.4; margin-bottom: 25px; overflow: hidden;
    }
    .word { color: #64748b; padding: 0 4px; border-radius: 4px; }
    .word.active { color: #fff; border-bottom: 2px solid var(--accent); background: rgba(255,255,255,0.05); }
    .word.correct { color: var(--success); }
    .word.wrong { color: var(--error); }
    
    .char-correct { color: var(--success); }
    .char-wrong { color: var(--error); text-decoration: underline; }

    /* Input */
    .input-box { display: flex; gap: 12px; }
    input[type="text"] { 
      flex: 1; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.1); 
      border-radius: 15px; padding: 15px 20px; color: white; font-size: 17px; outline: none;
    }
    input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); }

    .start-btn { 
      padding: 0 35px; border-radius: 15px; border: none; font-weight: 700; 
      cursor: pointer; background: var(--accent); color: var(--bg); font-size: 15px;
    }

    /* Footer */
    footer { padding: 20px; text-align: center; width: 100%; border-top: 1px solid rgba(255,255,255,0.05); }
    .footer-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 8px; }
    .footer-links a { color: var(--muted); text-decoration: none; font-size: 12px; }
    .footer-links a:hover { color: var(--accent); }
    .copy { font-size: 11px; color: var(--muted); opacity: 0.6; }

    /* Modal */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 999; }
    .modal-content { background: #1e293b; padding: 40px; border-radius: 30px; text-align: center; border: 1px solid var(--accent); width: 340px; }
    
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div class="app-container">
  <header>
    <div class="brand">
      <img src="https://i.postimg.cc/9Qy6YWFZ/Chat-GPT-Image-Nov-27-2025-09-35-45-PM.png" alt="logo">
      <h2>TypingMaster</h2>
    </div>
    <nav class="nav-links">
      <a href="account.html" id="userDisplayName">Hesab</a>
      <a href="telefon.html">Əlaqə</a>
      <a href="#" id="logoutBtn">Çıxış</a>
    </nav>
  </header>

  <main class="game-card">
    <div class="control-row">
      <div class="mode-selector" id="modeSelector">
        <button data-val="10">10</button>
        <button data-val="25" class="active">25</button>
        <button data-val="40">40</button>
        <button data-val="60">60</button>
      </div>

      <div class="live-stats">
        <div class="stat-pill"><label>Vaxt</label><span id="timerDisplay">00:00</span></div>
        <div class="stat-pill"><label>Sürət</label><span id="wpmDisplay">0</span></div>
        <div class="stat-pill"><label>Düz</label><span id="correctDisplay">0</span></div>
        <div class="stat-pill"><label>Səhv</label><span id="wrongDisplay">0</span></div>
      </div>
    </div>

    <div class="word-display" id="wordBox"></div>

    <div class="input-box">
      <input type="text" id="mainInput" placeholder="Daxil olun..." disabled autocomplete="off">
      <button class="start-btn" id="startAction">BAŞLA</button>
    </div>
  </main>
</div>

<footer>
  <div class="footer-links">
    <a href="privacy.html">Məxfilik Siyasəti</a>
    <a href="terms.html">İstifadə Şərtləri</a>
    <a href="haqqimizda.html">Haqqımızda</a>
    <a href="yardim.html">Yardım</a>
  </div>
  <div class="copy">© 2026 TypingMaster Global. Bütün hüquqlar qorunur.</div>
</footer>

<div id="resultModal" class="modal">
  <div class="modal-content">
    <h3 style="margin:0; font-weight:400; color:var(--muted)">Nəticə</h3>
    <span id="wpm-highlight" style="font-size: 4rem; color: var(--accent); font-weight: 800; display: block;">0</span>
    <p style="margin-top:-10px; font-size:14px">WPM</p>
    <div style="display:flex; justify-content: space-around; margin: 25px 0; background:rgba(0,0,0,0.2); padding:15px; border-radius:15px;">
        <div>Düz: <b id="finalCorrect" style="color:var(--success)">0</b></div>
        <div>Səhv: <b id="finalWrong" style="color:var(--error)">0</b></div>
    </div>
    <button class="start-btn" style="width:100%; height:45px" onclick="location.reload()">Yenidən Başla</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = { 
    apiKey: "AIzaSyCPUyl6EbO8dvJBTWofVBQg1a1xJHM4_08", authDomain: "salam-58d0a.firebaseapp.com", 
    projectId: "salam-58d0a", storageBucket: "salam-58d0a.firebasestorage.app", 
    messagingSenderId: "703442504339", appId: "1:703442504339:web:4d7757d08bb37189829b66" 
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  const wordPool = "salam dünya kitab klaviatura sürət texnologiya məktəb həyat proqramist uğur gələcək internet məlumat inkişaf azərbaycan musiqi günəş ulduz dəniz qələm dəftər kompyuter zəfər bilik hədəf arzu ekran sistem şəbəkə kod yazı sürətli dahi yaradıcı qüvvə fəza zaman məkan rəqəmsal".split(" ");
  let state = { words: [], currentIdx: 0, correct: 0, wrong: 0, startTime: null, isActive: false, limit: 25 };
  let currentUser = null;

  const inputEl = document.getElementById("mainInput");
  const wordBox = document.getElementById("wordBox");
  const logoutBtn = document.getElementById("logoutBtn");

  function setupWords() {
    state.words = [...wordPool].sort(() => Math.random() - 0.5).slice(0, state.limit);
    state.currentIdx = 0;
    renderWords();
  }

  document.querySelectorAll("#modeSelector button").forEach(btn => {
    btn.onclick = () => {
      if (state.isActive) return;
      document.querySelectorAll("#modeSelector button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      state.limit = parseInt(btn.dataset.val);
      setupWords();
    };
  });

  onAuthStateChanged(auth, async (user) => {
    currentUser = user;
    if (user) {
      logoutBtn.style.display = "block";
      const docRef = doc(db, "melumatlar", user.uid);
      const docSnap = await getDoc(docRef);
      document.getElementById("userDisplayName").innerText = (docSnap.exists() ? docSnap.data().name : user.email.split('@')[0]);
      inputEl.placeholder = "BAŞLA düyməsinə klikləyin";
    } else {
      logoutBtn.style.display = "none";
      document.getElementById("userDisplayName").innerText = "Hesab";
      inputEl.placeholder = "Məşq üçün daxil olun";
    }
  });

  logoutBtn.onclick = () => signOut(auth).then(() => window.location.reload());

  function renderWords() {
    wordBox.innerHTML = state.words.map((w, i) => `<span class="word ${i === state.currentIdx ? 'active' : ''}">${w}</span>`).join("");
  }

  function initGame() {
    state.isActive = true; state.startTime = Date.now();
    inputEl.disabled = false; inputEl.placeholder = "Yazmağa başlayın..."; inputEl.focus();
    document.getElementById("startAction").style.display = "none";
    document.getElementById("modeSelector").style.opacity = "0.2";
    startTimer();
  }

  function startTimer() {
    const timer = setInterval(() => {
      if (!state.isActive) { clearInterval(timer); return; }
      const elapsed = Math.floor((Date.now() - state.startTime) / 1000);
      document.getElementById("timerDisplay").innerText = `${Math.floor(elapsed/60).toString().padStart(2,'0')}:${(elapsed%60).toString().padStart(2,'0')}`;
      if(elapsed > 0) document.getElementById("wpmDisplay").innerText = Math.round(state.currentIdx / (elapsed / 60));
    }, 1000);
  }

  inputEl.oninput = () => {
    const typed = inputEl.value;
    const target = state.words[state.currentIdx];
    const wordEls = document.querySelectorAll(".word");
    let colored = "";
    for (let i = 0; i < target.length; i++) {
      if (i < typed.length) {
        colored += typed[i] === target[i] ? `<span class="char-correct">${target[i]}</span>` : `<span class="char-wrong">${target[i]}</span>`;
      } else colored += target[i];
    }
    wordEls[state.currentIdx].innerHTML = colored;
  };

  inputEl.onkeydown = (e) => {
    if (e.key === " ") {
      e.preventDefault();
      const typed = inputEl.value.trim();
      if (!typed) return;
      const target = state.words[state.currentIdx];
      const wordEls = document.querySelectorAll(".word");
      
      if (typed === target) { state.correct++; wordEls[state.currentIdx].className = "word correct"; }
      else { state.wrong++; wordEls[state.currentIdx].className = "word wrong"; wordEls[state.currentIdx].innerHTML = target; }

      state.currentIdx++;
      inputEl.value = "";
      if (state.currentIdx >= state.words.length) endGame();
      else {
        wordEls.forEach((el, i) => i === state.currentIdx ? el.classList.add("active") : el.classList.remove("active"));
        wordEls[state.currentIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
      document.getElementById("correctDisplay").innerText = state.correct;
      document.getElementById("wrongDisplay").innerText = state.wrong;
    }
  };

  async function endGame() {
    state.isActive = false; inputEl.disabled = true;
    const finalWpm = document.getElementById("wpmDisplay").innerText;
    document.getElementById("wpm-highlight").innerText = finalWpm;
    document.getElementById("finalCorrect").innerText = state.correct;
    document.getElementById("finalWrong").innerText = state.wrong;
    document.getElementById("resultModal").style.display = "flex";
    if (currentUser) {
      await setDoc(doc(db, "results", `${currentUser.email}_${Date.now()}`), {
        email: currentUser.email, wpm: parseInt(finalWpm), correct: state.correct, wrong: state.wrong, createdAt: serverTimestamp()
      });
    }
  }

  document.getElementById("startAction").onclick = () => {
    if (currentUser) initGame();
    else { window.location.href = "qeydiyyat.html"; }
  };

  setupWords();
</script>
</body>
</html>
