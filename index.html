<!doctype html>
<html lang="az">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TypingMaster — Professional Yazı Platforması</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { 
      --bg: #0b1120; --card-bg: rgba(22, 30, 46, 0.9); 
      --accent: #38bdf8; --text: #f8fafc; --muted: #64748b;
      --error: #f43f5e; --success: #10b981;
    }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    .container { width: 100%; max-width: 900px; padding: 20px; flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .main-card { background: var(--card-bg); backdrop-filter: blur(25px); border-radius: 32px; padding: 40px; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.7); }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .nav-links { display: flex; gap: 10px; }
    .nav-links a { color: var(--text); text-decoration: none; font-size: 13px; font-weight: 500; padding: 8px 16px; border-radius: 12px; background: rgba(255,255,255,0.05); }
    .nav-links a#logoutBtn { background: var(--error); color: white; display: none; }
    .stats-bar { display: flex; gap: 10px; }
    .stat-pill { background: rgba(0,0,0,0.25); padding: 8px 15px; border-radius: 12px; text-align: center; }
    .stat-pill span { color: var(--accent); font-weight: 800; }
    .word-stream { background: rgba(0,0,0,0.2); border-radius: 20px; padding: 30px; height: 160px; overflow: hidden; font-size: 24px; margin-bottom: 25px; }
    .input-row { display: flex; gap: 15px; }
    input[type="text"] { flex: 1; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 18px 25px; color: white; font-size: 18px; outline: none; }
    .btn { padding: 15px 35px; border-radius: 16px; border: none; font-weight: 800; cursor: pointer; background: var(--accent); color: var(--bg); }
  </style>
</head>
<body>

<div class="container">
  <div class="main-card">
    <header>
      <div style="display:flex; align-items:center; gap:12px;">
        <img src="https://i.postimg.cc/9Qy6YWFZ/Chat-GPT-Image-Nov-27-2025-09-35-45-PM.png" width="40" style="border-radius:10px">
        <h2 style="margin:0; font-size:1.4rem; font-weight:800;">TypingMaster</h2>
      </div>
      <nav class="nav-links">
        <a href="account.html" id="userDisplayName">Hesab</a>
        <a href="#" id="logoutBtn">ÇIXIŞ</a>
      </nav>
    </header>

    <div class="stats-bar" style="margin-bottom: 20px;">
      <div class="stat-pill"><label>Sürət</label> <span id="wpmDisplay">0</span> WPM</div>
      <div class="stat-pill"><label>Vaxt</label> <span id="timerDisplay">00:00</span></div>
    </div>

    <div class="word-stream" id="wordBox"></div>

    <div class="input-row">
      <input type="text" id="mainInput" placeholder="Yüklənir..." disabled autocomplete="off">
      <button class="btn" id="startAction">BAŞLA</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { 
    getFirestore, doc, getDoc, setDoc, serverTimestamp, 
    collection, query, where, getDocs, increment 
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = { 
    apiKey: "AIzaSyCPUyl6EbO8dvJBTWofVBQg1a1xJHM4_08", authDomain: "salam-58d0a.firebaseapp.com", 
    projectId: "salam-58d0a", storageBucket: "salam-58d0a.firebasestorage.app", 
    messagingSenderId: "703442504339", appId: "1:703442504339:web:4d7757d08bb37189829b66" 
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  let activeEmail = localStorage.getItem("tempEmail");
  const inputEl = document.getElementById("mainInput");
  const logoutBtn = document.getElementById("logoutBtn");

  // --- ƏSAS FUNKSİYA: ZİYARƏTÇİNİ QEYD ET ---
  async function trackVisitor(user) {
    if (sessionStorage.getItem("visited_this_session")) return;

    const now = Date.now();
    let docId, identity, type;

    if (user && user.email) {
      // Email ilə giribsə: email + vaxt damğası (Hər giriş ayrı sənəd olsun deyə)
      identity = user.email;
      docId = `${user.email}_${now}`;
      type = "registered";
    } else if (localStorage.getItem("tempEmail")) {
      // LocalStorage-da email varsa
      identity = localStorage.getItem("tempEmail");
      docId = `${identity}_${now}`;
      type = "registered";
    } else {
      // Tamamilə anonimdirsə
      const counterRef = doc(db, "counters", "visitor_stats");
      await setDoc(counterRef, { anonCount: increment(1) }, { merge: true });
      const snap = await getDoc(counterRef);
      const currentNumber = snap.data().anonCount || 1;
      
      identity = "anonim " + currentNumber;
      docId = `anonim_${currentNumber}_${now}`;
      type = "anonymous";
    }

    try {
      await setDoc(doc(db, "visitors", docId), {
        identity: identity,
        type: type,
        timestamp: serverTimestamp(),
        full_id: docId
      });
      sessionStorage.setItem("visited_this_session", "true");
    } catch (e) {
      console.error("Qeyd xətası:", e);
    }
  }

  onAuthStateChanged(auth, (user) => {
    trackVisitor(user); // Giriş edəni dərhal qeyd et
    
    if (user || activeEmail) {
      const email = user ? user.email : activeEmail;
      logoutBtn.style.display = "block";
      document.getElementById("userDisplayName").innerText = email.split('@')[0];
      inputEl.placeholder = "Hazırsınızsa BAŞLA-ya sıxın";
      inputEl.disabled = false;
    } else {
      logoutBtn.style.display = "none";
      document.getElementById("userDisplayName").innerText = "Hesab";
      inputEl.placeholder = "Daxil olun...";
    }
  });

  logoutBtn.onclick = () => {
    localStorage.removeItem("tempEmail");
    sessionStorage.removeItem("visited_this_session");
    signOut(auth).then(() => window.location.reload());
  };

  // Digər oyun kodların (generateWords, startGame və s.) bura davam edə bilər...
  // (Yuxarıdakı oyun məntiqini bura əlavə edə bilərsən)

</script>
</body>
</html>
