<!doctype html>
<html lang="az">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TypingMaster ‚ÄĒ Professional YazńĪ PlatformasńĪ</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { 
      --bg: #0f172a; --card-bg: rgba(30, 41, 59, 0.7); 
      --accent: #38bdf8; --text: #f1f5f9; --muted: #94a3b8;
      --error: #f43f5e; --success: #10b981;
    }
    
    * { box-sizing: border-box; transition: all 0.2s ease; }
    
    body { 
      margin: 0; background: var(--bg); color: var(--text); 
      font-family: 'Poppins', sans-serif; height: 100vh;
      display: flex; flex-direction: column; align-items: center; overflow: hidden;
    }

    .app-container {
      flex: 1; display: flex; flex-direction: column; justify-content: center;
      width: 95%; max-width: 900px; padding: 20px;
    }

    header { 
      display: flex; justify-content: space-between; align-items: center; 
      padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); width: 100%;
    }

    .brand { display: flex; align-items: center; gap: 10px; }
    .brand img { border-radius: 8px; width: 35px; }

    .nav-links { display: flex; gap: 12px; align-items: center; }
    .nav-links a { 
      color: var(--text); text-decoration: none; font-size: 13px; font-weight: 500;
      padding: 8px 15px; border-radius: 10px; background: rgba(255,255,255,0.05);
    }

    /* √áIXIŇě D√úYM∆ŹSńį - QńĪrmńĪzńĪ v…ô M…ôcburi G√∂r√ľn…ôn */
    #logoutBtn { 
      background: var(--error) !important; 
      color: white !important; 
      font-weight: 800 !important;
      display: none; /* JS t…ôr…ôfind…ôn idar…ô olunacaq */
    }

    .game-card { 
      background: var(--card-bg); backdrop-filter: blur(15px); 
      border-radius: 30px; padding: 30px; border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); margin-top: 20px;
    }

    .control-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .mode-selector { display: flex; background: rgba(0,0,0,0.3); padding: 4px; border-radius: 12px; }
    .mode-selector button { 
      background: transparent; border: none; color: var(--muted); padding: 6px 15px; 
      cursor: pointer; font-size: 13px; font-weight: 600; border-radius: 8px;
    }
    .mode-selector button.active { background: var(--accent); color: var(--bg); }

    .live-stats { display: flex; gap: 8px; }
    .stat-pill { background: rgba(0,0,0,0.2); padding: 6px 12px; border-radius: 10px; text-align: center; min-width: 65px; }
    .stat-pill label { display: block; font-size: 8px; color: var(--muted); text-transform: uppercase; }
    .stat-pill span { color: var(--accent); font-weight: 700; font-size: 1rem; }

    .word-display { 
      background: rgba(0,0,0,0.2); border-radius: 20px; padding: 25px; 
      height: 140px; display: flex; flex-wrap: wrap; gap: 10px; 
      font-size: 22px; line-height: 1.4; margin-bottom: 25px; overflow: hidden;
    }
    .word { color: #64748b; padding: 0 4px; }
    .word.active { color: #fff; border-bottom: 2px solid var(--accent); }
    .word.correct { color: var(--success); }
    .word.wrong { color: var(--error); }

    .input-box { display: flex; gap: 12px; }
    input[type="text"] { 
      flex: 1; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.1); 
      border-radius: 15px; padding: 15px 20px; color: white; font-size: 17px; outline: none;
    }

    .start-btn { 
      padding: 0 35px; border-radius: 15px; border: none; font-weight: 700; 
      cursor: pointer; background: var(--accent); color: var(--bg); font-size: 15px;
    }

    footer { padding: 20px; text-align: center; width: 100%; border-top: 1px solid rgba(255,255,255,0.05); }
    .footer-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 5px; }
    .footer-links a { color: var(--muted); text-decoration: none; font-size: 11px; }

    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 999; }
    .modal-content { background: #1e293b; padding: 35px; border-radius: 25px; text-align: center; border: 1px solid var(--accent); width: 320px; }
    
    .char-correct { color: var(--success); }
    .char-wrong { color: var(--error); text-decoration: underline; }
  </style>
</head>
<body>

<div class="app-container">
  <header>
    <div class="brand">
      <img src="https://i.postimg.cc/9Qy6YWFZ/Chat-GPT-Image-Nov-27-2025-09-35-45-PM.png" alt="logo">
      <h2>TypingMaster</h2>
    </div>
    <nav class="nav-links">
      <a href="account.html" id="userDisplayName">Hesab</a>
      <a href="telefon.html">∆Źlaq…ô</a>
      <a href="#" id="logoutBtn">√áIXIŇě</a>
    </nav>
  </header>

  <main class="game-card">
    <div class="control-row">
      <div class="mode-selector" id="modeSelector">
        <button data-val="10">10</button>
        <button data-val="25" class="active">25</button>
        <button data-val="40">40</button>
        <button data-val="60">60</button>
      </div>
      <div class="live-stats">
        <div class="stat-pill"><label>Vaxt</label><span id="timerDisplay">00:00</span></div>
        <div class="stat-pill"><label>WPM</label><span id="wpmDisplay">0</span></div>
        <div class="stat-pill"><label>D√ľz</label><span id="correctDisplay">0</span></div>
        <div class="stat-pill"><label>S…ôhv</label><span id="wrongDisplay">0</span></div>
      </div>
    </div>

    <div class="word-display" id="wordBox"></div>

    <div class="input-box">
      <input type="text" id="mainInput" placeholder="Y√ľkl…ônir..." disabled autocomplete="off">
      <button class="start-btn" id="startAction">BAŇěLA</button>
    </div>
  </main>
</div>

<footer>
  <div class="footer-links">
    <a href="privacy.html">M…ôxfilik Siyas…ôti</a>
    <a href="terms.html">ńįstifad…ô Ňě…ôrtl…ôri</a>
    <a href="haqqimizda.html">HaqqńĪmńĪzda</a>
  </div>
  <div style="font-size: 10px; color: var(--muted); margin-top: 5px;">¬© 2026 TypingMaster</div>
</footer>

<div id="resultModal" class="modal">
  <div class="modal-content">
    <span id="wpm-highlight" style="font-size: 3.5rem; color: var(--accent); font-weight: 800; display: block;">0</span>
    <p style="margin: 0 0 20px 0; font-size:14px; color: var(--muted)">S√∂z / D…ôqiq…ô</p>
    <div style="display:flex; justify-content: space-around; margin-bottom: 25px;">
        <div>D√ľz: <b id="finalCorrect" style="color:var(--success)">0</b></div>
        <div>S…ôhv: <b id="finalWrong" style="color:var(--error)">0</b></div>
    </div>
    <button class="start-btn" style="width:100%; padding:12px;" onclick="location.reload()">Yenid…ôn</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = { 
    apiKey: "AIzaSyCPUyl6EbO8dvJBTWofVBQg1a1xJHM4_08", authDomain: "salam-58d0a.firebaseapp.com", 
    projectId: "salam-58d0a", storageBucket: "salam-58d0a.firebasestorage.app", 
    messagingSenderId: "703442504339", appId: "1:703442504339:web:4d7757d08bb37189829b66" 
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  const wordPool = "salam d√ľnya kitab klaviatura s√ľr…ôt texnologiya m…ôkt…ôb h…ôyat proqramist uńüur g…ôl…ôc…ôk internet m…ôlumat inkiŇüaf az…ôrbaycan musiqi g√ľn…ôŇü ulduz d…ôniz q…ôl…ôm d…ôft…ôr kompyuter z…ôf…ôr bilik h…ôd…ôf arzu ekran sistem Ňü…ôb…ôk…ô kod yazńĪ s√ľr…ôtli dahi yaradńĪcńĪ q√ľvv…ô f…ôza zaman m…ôkan r…ôq…ômsal".split(" ");
  let state = { words: [], currentIdx: 0, correct: 0, wrong: 0, startTime: null, isActive: false, limit: 25 };
  
  // Qlobal ńįstifad…ô√ßi Obyekti
  let currentUser = null;

  const inputEl = document.getElementById("mainInput");
  const wordBox = document.getElementById("wordBox");
  const logoutBtn = document.getElementById("logoutBtn");
  const userLabel = document.getElementById("userDisplayName");

  // Auth Statusu Yoxla (G√úCL∆ŹNDńįRńįLMńįŇě)
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user; // Global d…ôyiŇü…ôni m√ľtl…ôq m…ônims…ôt
      logoutBtn.style.setProperty('display', 'block', 'important'); // CSS !important-ńĪ aktiv et
      
      const docRef = doc(db, "melumatlar", user.uid);
      try {
        const docSnap = await getDoc(docRef);
        userLabel.innerText = docSnap.exists() ? docSnap.data().name : user.email.split('@')[0];
      } catch(e) {
        userLabel.innerText = user.email.split('@')[0];
      }
      
      inputEl.placeholder = "BAŇěLA d√ľym…ôsin…ô klikl…ôyin";
      inputEl.disabled = true; // YalnńĪz BAŇěLA-dan sonra aktiv olar
    } else {
      currentUser = null;
      logoutBtn.style.display = "none";
      userLabel.innerText = "Hesab";
      inputEl.placeholder = "M…ôŇüq √ľ√ß√ľn daxil olun";
    }
  });

  // √áńĪxńĪŇü FunksiyasńĪ
  logoutBtn.addEventListener('click', (e) => {
    e.preventDefault();
    signOut(auth).then(() => {
      window.location.reload();
    });
  });

  function setupWords() {
    state.words = [...wordPool].sort(() => Math.random() - 0.5).slice(0, state.limit);
    state.currentIdx = 0;
    wordBox.innerHTML = state.words.map((w, i) => `<span class="word ${i === 0 ? 'active' : ''}">${w}</span>`).join("");
  }

  // BaŇülat d√ľym…ôsi (YoxlanńĪŇülńĪ)
  document.getElementById("startAction").onclick = () => {
    if (currentUser || auth.currentUser) {
      if(!currentUser) currentUser = auth.currentUser; // H…ôr ehtimala qarŇüńĪ Firebase-d…ôn bir d…ô √ß…ôk
      
      state.isActive = true; 
      state.startTime = Date.now();
      inputEl.disabled = false; 
      inputEl.placeholder = "YazńĪn..."; 
      inputEl.focus();
      document.getElementById("startAction").style.display = "none";
      document.getElementById("modeSelector").style.opacity = "0.2";
      startTimer();
    } else {
      alert("Oyuna baŇülamaq √ľ√ß√ľn …ôvv…ôlc…ô daxil olmalńĪsńĪnńĪz!");
      window.location.href = "qeydiyyat.html";
    }
  };

  // Dig…ôr Oyun M…ôntiql…ôri (D…ôyiŇüm…ôz qalńĪr)
  function startTimer() {
    const timer = setInterval(() => {
      if (!state.isActive) { clearInterval(timer); return; }
      const elapsed = (Date.now() - state.startTime) / 1000;
      document.getElementById("timerDisplay").innerText = `${Math.floor(elapsed/60).toString().padStart(2,'0')}:${Math.floor(elapsed%60).toString().padStart(2,'0')}`;
      if(elapsed > 0) document.getElementById("wpmDisplay").innerText = Math.round(state.currentIdx / (elapsed / 60));
    }, 1000);
  }

  inputEl.oninput = () => {
    const typed = inputEl.value;
    const target = state.words[state.currentIdx];
    const wordEls = document.querySelectorAll(".word");
    let colored = "";
    for (let i = 0; i < target.length; i++) {
        if (i < typed.length) {
            colored += typed[i] === target[i] ? `<span class="char-correct">${target[i]}</span>` : `<span class="char-wrong">${target[i]}</span>`;
        } else colored += target[i];
    }
    wordEls[state.currentIdx].innerHTML = colored;
  };

  inputEl.onkeydown = (e) => {
    if (e.key === " ") {
      e.preventDefault();
      const typed = inputEl.value.trim();
      if (!typed) return;
      const target = state.words[state.currentIdx];
      const wordEls = document.querySelectorAll(".word");
      
      if (typed === target) { state.correct++; wordEls[state.currentIdx].className = "word correct"; }
      else { state.wrong++; wordEls[state.currentIdx].className = "word wrong"; wordEls[state.currentIdx].innerHTML = target; }

      state.currentIdx++;
      inputEl.value = "";
      if (state.currentIdx >= state.words.length) endGame();
      else {
        wordEls.forEach((el, i) => i === state.currentIdx ? el.classList.add('active') : el.classList.remove('active'));
        wordEls[state.currentIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
      document.getElementById("correctDisplay").innerText = state.correct;
      document.getElementById("wrongDisplay").innerText = state.wrong;
    }
  };

  async function endGame() {
    state.isActive = false; 
    inputEl.disabled = true;
    const finalWpm = document.getElementById("wpmDisplay").innerText;
    document.getElementById("wpm-highlight").innerText = finalWpm;
    document.getElementById("finalCorrect").innerText = state.correct;
    document.getElementById("finalWrong").innerText = state.wrong;
    document.getElementById("resultModal").style.display = "flex";
    
    if (currentUser) {
      await setDoc(doc(db, "results", `${currentUser.email}_${Date.now()}`), {
        email: currentUser.email, wpm: parseInt(finalWpm), correct: state.correct, wrong: state.wrong, createdAt: serverTimestamp()
      });
    }
  }

  setupWords();
</script>
</body>
</html>
