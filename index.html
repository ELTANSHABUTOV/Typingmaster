<!doctype html>
<html lang="az">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5663281315926059" crossorigin="anonymous"></script>
  
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TypingMaster — Professional Yazı Platforması</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { 
      --bg: #0f172a; 
      --card-bg: rgba(30, 41, 59, 0.7); 
      --accent: #38bdf8; 
      --text: #f8fafc; 
      --muted: #94a3b8;
      --error: #ff4757; 
      --success: #2ed573;
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    * { box-sizing: border-box; transition: all 0.3s ease; }

    body { 
      margin: 0; 
      background: radial-gradient(circle at top right, #1e293b, #0f172a); 
      color: var(--text); 
      font-family: 'Poppins', sans-serif; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      min-height: 100vh;
      overflow-x: hidden;
    }

    .container { 
      width: 100%; 
      max-width: 1000px; 
      padding: 40px 20px; 
      flex: 1; 
      display: flex; 
      flex-direction: column; 
      justify-content: center; 
    }

    .main-card { 
      background: var(--card-bg); 
      backdrop-filter: blur(20px); 
      border-radius: 40px; 
      padding: 50px; 
      border: 1px solid var(--glass-border);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      position: relative;
    }

    header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 40px; 
    }

    .nav-links { display: flex; gap: 15px; }
    .nav-links a { 
      color: var(--text); 
      text-decoration: none; 
      font-size: 14px; 
      font-weight: 500;
      padding: 10px 20px; 
      border-radius: 15px; 
      background: rgba(255,255,255,0.03);
      border: 1px solid transparent;
    }
    .nav-links a:hover { 
      background: rgba(56, 189, 248, 0.1); 
      border-color: var(--accent);
      color: var(--accent);
    }
    
    .char-correct { color: var(--success); }
    .char-wrong { color: var(--error); background: rgba(255, 71, 87, 0.2); border-radius: 4px; padding: 0 1px; }

    .game-options { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 30px;
    }

    .word-counts { 
      display: flex; 
      background: rgba(0,0,0,0.2); 
      padding: 6px; 
      border-radius: 18px; 
      border: 1px solid var(--glass-border);
    }
    .word-counts button { 
      background: transparent; 
      border: none; 
      color: var(--muted); 
      padding: 8px 18px; 
      cursor: pointer; 
      font-weight: 600; 
      border-radius: 12px;
    }
    .word-counts button.active { 
      background: var(--accent); 
      color: #000;
      box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
    }

    .stats-bar { display: flex; gap: 20px; }
    .stat-pill { 
      background: rgba(15, 23, 42, 0.6); 
      padding: 12px 25px; 
      border-radius: 20px; 
      text-align: center;
      border: 1px solid var(--glass-border);
    }
    .stat-pill label { display: block; font-size: 10px; color: var(--muted); text-transform: uppercase; font-weight: 700; margin-bottom: 4px; }
    .stat-pill span { color: var(--accent); font-weight: 800; font-size: 1.5rem; }
    
    .word-stream { 
      background: rgba(0,0,0,0.15); 
      border-radius: 25px; 
      padding: 40px; 
      height: 200px; /* Daha böyük oyun sahəsi */
      display: flex; 
      flex-wrap: wrap; 
      gap: 15px; 
      font-size: 32px; /* Daha böyük şrift */
      line-height: 1.6; 
      margin-bottom: 35px; 
      overflow: hidden;
      border: 1px solid var(--glass-border);
      user-select: none;
    }

    .word { color: var(--muted); padding: 0 8px; border-radius: 8px; border-bottom: 3px solid transparent; }
    .word.current { 
      color: #fff; 
      background: rgba(56, 189, 248, 0.1); 
      border-bottom-color: var(--accent);
      transform: scale(1.05);
    }
    .word.correct { color: var(--success); }
    .word.wrong { color: var(--error); border-bottom-color: var(--error); }

    .input-row { display: flex; gap: 20px; position: relative; }
    input[type="text"] { 
      flex: 1; 
      background: rgba(15, 23, 42, 0.8); 
      border: 2px solid var(--glass-border); 
      border-radius: 20px; 
      padding: 22px 30px; 
      color: white; 
      font-size: 20px; 
      outline: none;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
    }
    input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(56, 189, 248, 0.2); }

    .btn { 
      padding: 0 45px; 
      border-radius: 20px; 
      border: none; 
      font-weight: 800; 
      cursor: pointer; 
      background: var(--accent); 
      color: #000; 
      text-transform: uppercase; 
      letter-spacing: 1px;
      box-shadow: 0 10px 20px rgba(56, 189, 248, 0.3);
    }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(56, 189, 248, 0.4); }
    .btn:active { transform: translateY(0); }
    
    .modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); display: none; justify-content: center; align-items: center; z-index: 9999; }
    .modal-content { 
      background: #1e293b; 
      padding: 60px; 
      border-radius: 40px; 
      text-align: center; 
      border: 1px solid var(--accent); 
      width: 90%; 
      max-width: 450px; 
      box-shadow: 0 0 100px rgba(56, 189, 248, 0.2);
    }

    footer { 
      margin-top: auto; 
      padding: 60px 20px; 
      text-align: center; 
      background: rgba(15, 23, 42, 0.5); 
      width: 100%;
      border-top: 1px solid var(--glass-border);
    }
    .footer-links { display: flex; justify-content: center; gap: 30px; margin-top: 20px; }
    .footer-links a { color: var(--muted); text-decoration: none; font-size: 13px; font-weight: 500; }
    .footer-links a:hover { color: var(--accent); }

    /* Animasiya */
    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.7; }
      100% { opacity: 1; }
    }
    .current { animation: pulse 1.5s infinite; }
  </style>
</head>
<body>

<div class="container">
  <div class="main-card">
    <header>
      <div style="display:flex; align-items:center; gap:15px;">
        <div style="background: var(--accent); padding: 8px; border-radius: 12px; display: flex;">
            <img src="https://i.postimg.cc/9Qy6YWFZ/Chat-GPT-Image-Nov-27-2025-09-35-45-PM.png" width="35" style="border-radius:6px">
        </div>
        <h1 style="margin:0; font-size:1.8rem; font-weight:800; letter-spacing:-1px;">Typing<span style="color:var(--accent)">Master</span></h1>
      </div>
      <nav class="nav-links">
        <a href="account.html" id="userDisplayName">Hesab</a>
        <a href="haqqimizda.html">Haqqımızda</a>
        <a href="telefon.html">Dəstək</a>
      </nav>
    </header>

    <div class="game-options">
      <div class="word-counts" id="wordSelector">
        <button data-val="10">10</button>
        <button data-val="25" class="active">25</button>
        <button data-val="50">50</button>
        <button data-val="100">100</button>
      </div>
      <div class="stats-bar">
        <div class="stat-pill"><label>Sürət (WPM)</label><span id="wpmDisplay">0</span></div>
        <div class="stat-pill"><label>Qalan Vaxt</label><span id="timerDisplay">0s</span></div>
      </div>
    </div>

    <div class="word-stream" id="wordBox"></div>

    <div class="input-row">
      <input type="text" id="mainInput" placeholder="Sınağa başlamaq üçün düyməni sıxın..." disabled autocomplete="off">
      <button class="btn" id="startAction">BAŞLA</button>
    </div>
  </div>
</div>

<footer>
  <div style="max-width: 900px; margin: 0 auto;">
    <p style="color: var(--text); font-size: 15px; margin-bottom: 12px; font-weight: 500;">
      TypingMaster — Azərbaycan dilində sürətli yazma vərdişlərinizi inkişaf etdirin.
    </p>
    <div class="footer-links">
      <a href="privacy-policy.html">Məxfilik Siyasəti</a>
      <a href="terms.html">İstifadə Şərtləri</a>
      <a href="cookies.html">Cookie Siyasəti</a>
      <a href="haqqimizda.html">Biz Kimik?</a>
    </div>
    <p style="color: var(--muted); font-size: 11px; margin-top: 25px; opacity: 0.6;">
      &copy; 2026 TypingMaster Platform. Bütün hüquqlar qorunur.
    </p>
  </div>
</footer>

<div id="resultModal" class="modal">
  <div class="modal-content">
    <h3 style="margin-top:0; font-size: 1.5rem;">Təbriklər!</h3>
    <p style="color: var(--muted);">Sizin orta sürətiniz:</p>
    <span id="wpm-highlight" style="font-size: 5rem; color: var(--accent); font-weight: 800; display: block; line-height:1;">0</span>
    <p style="font-weight: 600; letter-spacing: 2px; margin-bottom: 30px;">SÖZ / DƏQİQƏ</p>
    <button class="btn" style="width:100%; padding: 20px;" onclick="location.reload()">YENİDƏN BAŞLA</button>
  </div>
</div>

<script type="module">
  // Sizin orijinal Firebase və Oyun məntiqi kodunuz bura daxildir (Heç bir dəyişiklik edilməyib)
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCYWC8P0meXFbyRoSA4uHkJmJRkPFlhwSQ",
    authDomain: "salam-58d0a.firebaseapp.com",
    projectId: "salam-58d0a",
    storageBucket: "salam-58d0a.firebasestorage.app",
    messagingSenderId: "703442504339",
    appId: "1:703442504339:web:f9a6b1f54db80c4c829b66"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let state = { words: [], currentIdx: 0, startTime: null, isActive: false, limit: 25, timerInterval: null };
  const wordPool = "salam dünya kitab klaviatura sürət texnologiya məktəb həyat proqramist uğur gələcək internet məlumat inkişaf azərbaycan musiqi günəş ulduz dəniz qələm dəftər kompyuter sistem şəbəkə yazı sürətli dahi yaradıcı qüvvə fəza zaman məkan rəqəmsal kitabxana təhsil oyun platforma qabiliyyət məqsəd arzular".split(" ");

  const inputEl = document.getElementById("mainInput");
  const wordBox = document.getElementById("wordBox");

  onAuthStateChanged(auth, async (user) => {
    const email = user ? user.email : localStorage.getItem("tempEmail");
    if (email) {
      const q = query(collection(db, "melumatlar"), where("email", "==", email.toLowerCase()));
      const snap = await getDocs(q);
      if (!snap.empty) {
        document.getElementById("userDisplayName").innerText = snap.docs[0].data().name || email.split('@')[0];
      }
      inputEl.placeholder = "Hazırsınızsa BAŞLA-ya sıxın";
    } else {
      window.location.href = "qeydiyyat.html";
    }
  });

  document.getElementById("wordSelector").onclick = (e) => {
    if (e.target.tagName === "BUTTON") {
      document.querySelectorAll("#wordSelector button").forEach(btn => btn.classList.remove("active"));
      e.target.classList.add("active");
      state.limit = parseInt(e.target.dataset.val);
      resetGame();
    }
  };

  function resetGame() {
    state.isActive = false;
    state.currentIdx = 0;
    state.startTime = null;
    clearInterval(state.timerInterval);
    inputEl.value = "";
    inputEl.disabled = true;
    document.getElementById("startAction").style.display = "block";
    document.getElementById("timerDisplay").innerText = "0s";
    document.getElementById("wpmDisplay").innerText = "0";
    generateWords();
  }

  function generateWords() {
    state.words = [];
    for(let i=0; i<state.limit; i++) {
        state.words.push(wordPool[Math.floor(Math.random() * wordPool.length)]);
    }
    wordBox.innerHTML = state.words.map((w, i) => `<span class="word ${i === 0 ? 'current' : ''}">${w}</span>`).join("");
    wordBox.scrollTop = 0;
  }

  function scrollToCurrentWord() {
    const currentWordEl = document.querySelectorAll(".word")[state.currentIdx];
    if (currentWordEl) {
      const boxRect = wordBox.getBoundingClientRect();
      const wordRect = currentWordEl.getBoundingClientRect();
      if (wordRect.bottom > boxRect.bottom || wordRect.top < boxRect.top) {
        currentWordEl.scrollIntoView({ behavior: "smooth", block: "center" });
      }
    }
  }

  inputEl.oninput = () => {
    if (!state.isActive) return;
    const typed = inputEl.value;
    const target = state.words[state.currentIdx];
    const currentWordEl = document.querySelectorAll(".word")[state.currentIdx];

    let coloredHTML = "";
    for (let i = 0; i < target.length; i++) {
      if (i < typed.length) {
        coloredHTML += `<span class="${typed[i] === target[i] ? 'char-correct' : 'char-wrong'}">${target[i]}</span>`;
      } else {
        coloredHTML += target[i];
      }
    }
    currentWordEl.innerHTML = coloredHTML;
    
    if (typed.length > target.length) currentWordEl.classList.add("wrong");
    else currentWordEl.classList.remove("wrong");
  };

  inputEl.onkeydown = (e) => {
    if (e.key === " ") {
      e.preventDefault();
      const typed = inputEl.value.trim();
      const target = state.words[state.currentIdx];
      const wordEls = document.querySelectorAll(".word");
      
      wordEls[state.currentIdx].className = (typed === target) ? "word correct" : "word wrong";
      state.currentIdx++;
      inputEl.value = "";
      
      if (state.currentIdx >= state.words.length) {
        state.isActive = false;
        clearInterval(state.timerInterval);
        document.getElementById("wpm-highlight").innerText = document.getElementById("wpmDisplay").innerText;
        document.getElementById("resultModal").style.display = "flex";
      } else {
        wordEls[state.currentIdx].classList.add("current");
        scrollToCurrentWord();
      }
    }
  };

  document.getElementById("startAction").onclick = () => {
    state.isActive = true; 
    state.startTime = Date.now();
    inputEl.disabled = false; 
    inputEl.focus();
    document.getElementById("startAction").style.display = "none";
    
    state.timerInterval = setInterval(() => {
      if (!state.isActive) return;
      const elapsed = (Date.now() - state.startTime) / 1000;
      document.getElementById("timerDisplay").innerText = Math.floor(elapsed) + "s";
      document.getElementById("wpmDisplay").innerText = Math.round(state.currentIdx / (elapsed / 60)) || 0;
    }, 1000);
  };

  generateWords();
</script>
</body>
</html>
