<!doctype html>
<html lang="az">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TypingMaster — Professional Yazı Platforması</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { 
      --bg: #0b1120; --card-bg: rgba(22, 30, 46, 0.9); 
      --accent: #38bdf8; --text: #f8fafc; --muted: #64748b;
      --error: #f43f5e; --success: #10b981;
    }
    * { box-sizing: border-box; transition: all 0.2s; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    .container { width: 100%; max-width: 900px; padding: 20px; flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .main-card { background: var(--card-bg); backdrop-filter: blur(25px); border-radius: 32px; padding: 40px; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.7); }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .nav-links { display: flex; gap: 10px; }
    .nav-links a { color: var(--text); text-decoration: none; font-size: 13px; font-weight: 500; padding: 8px 16px; border-radius: 12px; background: rgba(255,255,255,0.05); }
    .nav-links a#logoutBtn { background: var(--error); color: white; display: none; }
    .stats-bar { display: flex; gap: 10px; margin-bottom: 20px; }
    .stat-pill { background: rgba(0,0,0,0.25); padding: 8px 15px; border-radius: 12px; text-align: center; min-width: 100px; }
    .stat-pill label { display: block; font-size: 10px; color: var(--muted); text-transform: uppercase; }
    .stat-pill span { color: var(--accent); font-weight: 800; font-size: 1.2rem; }
    .word-stream { background: rgba(0,0,0,0.2); border-radius: 20px; padding: 30px; height: 160px; overflow: hidden; font-size: 24px; line-height: 1.6; display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 25px; }
    .word { color: var(--muted); }
    .word.current { color: #fff; border-bottom: 2px solid var(--accent); }
    .word.correct { color: var(--success); }
    .word.wrong { color: var(--error); }
    .input-row { display: flex; gap: 15px; }
    input[type="text"] { flex: 1; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 18px 25px; color: white; font-size: 18px; outline: none; }
    input[type="text"]:focus { border-color: var(--accent); }
    .btn { padding: 15px 35px; border-radius: 16px; border: none; font-weight: 800; cursor: pointer; background: var(--accent); color: var(--bg); text-transform: uppercase; }
    .char-correct { color: var(--success); }
    .char-wrong { color: var(--error); text-decoration: underline; }
  </style>
</head>
<body>

<div class="container">
  <div class="main-card">
    <header>
      <div style="display:flex; align-items:center; gap:12px;">
        <img src="https://i.postimg.cc/9Qy6YWFZ/Chat-GPT-Image-Nov-27-2025-09-35-45-PM.png" width="40" style="border-radius:10px">
        <h2 style="margin:0; font-size:1.4rem; font-weight:800;">TypingMaster</h2>
      </div>
      <nav class="nav-links">
        <a href="account.html" id="userDisplayName">Hesab</a>
        <a href="#" id="logoutBtn">ÇIXIŞ</a>
      </nav>
    </header>

    <div class="stats-bar">
      <div class="stat-pill"><label>Sürət</label> <span id="wpmDisplay">0</span></div>
      <div class="stat-pill"><label>Vaxt</label> <span id="timerDisplay">00:00</span></div>
    </div>

    <div class="word-stream" id="wordBox"></div>

    <div class="input-row">
      <input type="text" id="mainInput" placeholder="Yüklənir..." disabled autocomplete="off">
      <button class="btn" id="startAction">BAŞLA</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { 
    getFirestore, doc, getDoc, setDoc, addDoc, serverTimestamp, 
    collection, query, where, getDocs, increment 
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = { 
    apiKey: "AIzaSyCPUyl6EbO8dvJBTWofVBQg1a1xJHM4_08", authDomain: "salam-58d0a.firebaseapp.com", 
    projectId: "salam-58d0a", storageBucket: "salam-58d0a.firebasestorage.app", 
    messagingSenderId: "703442504339", appId: "1:703442504339:web:4d7757d08bb37189829b66" 
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  const wordPool = "salam dünya kitab klaviatura sürət texnologiya məktəb həyat proqramist uğur gələcək internet məlumat inkişaf azərbaycan musiqi günəş ulduz dəniz qələm dəftər kompyuter sistem şəbəkə yazı sürətli dahi yaradıcı qüvvə fəza zaman məkan rəqəmsal".split(" ");
  let state = { words: [], currentIdx: 0, correct: 0, wrong: 0, startTime: null, isActive: false, limit: 25 };
  
  const inputEl = document.getElementById("mainInput");
  const wordBox = document.getElementById("wordBox");
  const logoutBtn = document.getElementById("logoutBtn");

  // --- ZİYARƏTÇİ İZLƏMƏSİ ---
  async function trackVisitor(user) {
    if (sessionStorage.getItem("visited_this_session")) return;
    const now = Date.now();
    let docId, identity, type;

    if (user && user.email) {
      identity = user.email;
      docId = `${user.email}_${now}`;
      type = "registered";
    } else {
      const counterRef = doc(db, "counters", "visitor_stats");
      await setDoc(counterRef, { anonCount: increment(1) }, { merge: true });
      const snap = await getDoc(counterRef);
      const num = snap.data().anonCount || 1;
      identity = "anonim " + num;
      docId = `anonim_${num}_${now}`;
      type = "anonymous";
    }

    try {
      await setDoc(doc(db, "visitors", docId), { identity, type, timestamp: serverTimestamp() });
      sessionStorage.setItem("visited_this_session", "true");
    } catch (e) { console.error(e); }
  }

  // --- OYUN MƏNTİQİ ---
  function generateWords() {
    state.words = [...wordPool].sort(() => Math.random() - 0.5).slice(0, state.limit);
    state.currentIdx = 0;
    wordBox.innerHTML = state.words.map((w, i) => `<span class="word ${i === 0 ? 'current' : ''}">${w}</span>`).join("");
  }

  function startTimer() {
    const timer = setInterval(() => {
      if (!state.isActive) { clearInterval(timer); return; }
      const elapsed = (Date.now() - state.startTime) / 1000;
      document.getElementById("timerDisplay").innerText = `${Math.floor(elapsed/60).toString().padStart(2,'0')}:${Math.floor(elapsed%60).toString().padStart(2,'0')}`;
      if(elapsed > 0) document.getElementById("wpmDisplay").innerText = Math.round(state.currentIdx / (elapsed / 60));
    }, 1000);
  }

  document.getElementById("startAction").onclick = () => {
    state.isActive = true;
    state.startTime = Date.now();
    inputEl.disabled = false;
    inputEl.focus();
    document.getElementById("startAction").style.display = "none";
    startTimer();
  };

  inputEl.oninput = () => {
    const typed = inputEl.value;
    const target = state.words[state.currentIdx];
    const wordEls = document.querySelectorAll(".word");
    let colored = "";
    for (let i = 0; i < target.length; i++) {
      if (i < typed.length) {
        colored += typed[i] === target[i] ? `<span class="char-correct">${target[i]}</span>` : `<span class="char-wrong">${target[i]}</span>`;
      } else colored += target[i];
    }
    wordEls[state.currentIdx].innerHTML = colored;
  };

  inputEl.onkeydown = (e) => {
    if (e.key === " ") {
      e.preventDefault();
      const typed = inputEl.value.trim();
      if (!typed) return;
      const target = state.words[state.currentIdx];
      const wordEls = document.querySelectorAll(".word");
      
      if (typed === target) { state.correct++; wordEls[state.currentIdx].className = "word correct"; }
      else { state.wrong++; wordEls[state.currentIdx].className = "word wrong"; wordEls[state.currentIdx].innerHTML = target; }

      state.currentIdx++;
      inputEl.value = "";
      if (state.currentIdx >= state.words.length) {
        state.isActive = false;
        alert("Oyun bitdi! WPM: " + document.getElementById("wpmDisplay").innerText);
        location.reload();
      } else {
        wordEls.forEach((el, i) => i === state.currentIdx ? el.classList.add('current') : el.classList.remove('current'));
      }
    }
  };

  onAuthStateChanged(auth, (user) => {
    trackVisitor(user);
    if (user) {
      logoutBtn.style.display = "block";
      document.getElementById("userDisplayName").innerText = user.email.split('@')[0];
      inputEl.placeholder = "Hazırsınızsa BAŞLA-ya sıxın";
    } else {
      inputEl.placeholder = "Daxil olun...";
    }
  });

  logoutBtn.onclick = () => {
    signOut(auth).then(() => {
      sessionStorage.removeItem("visited_this_session");
      window.location.reload();
    });
  };

  generateWords();
</script>
</body>
</html>
