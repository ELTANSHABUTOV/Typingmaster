<!doctype html>
<html lang="az">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5663281315926059" crossorigin="anonymous"></script>
  
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TypingMaster — Professional Yazı Platforması</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { 
      --bg: #0f172a; 
      --card-bg: rgba(30, 41, 59, 0.7); 
      --accent: #38bdf8; 
      --text: #f8fafc; 
      --muted: #94a3b8;
      --error: #ff4757; 
      --success: #2ed573;
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    * { box-sizing: border-box; transition: all 0.3s ease; }

    body { 
      margin: 0; 
      background: radial-gradient(circle at top right, #1e293b, #0f172a); 
      color: var(--text); 
      font-family: 'Poppins', sans-serif; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      min-height: 100vh;
    }

    .container { width: 100%; max-width: 1000px; padding: 40px 20px; flex: 1; display: flex; flex-direction: column; justify-content: center; }

    .main-card { 
      background: var(--card-bg); 
      backdrop-filter: blur(20px); 
      border-radius: 40px; 
      padding: 50px; 
      border: 1px solid var(--glass-border);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }

    .nav-links { display: flex; gap: 15px; }
    .nav-links a { 
      color: var(--text); text-decoration: none; font-size: 14px; font-weight: 500;
      padding: 10px 20px; border-radius: 15px; background: rgba(255,255,255,0.03);
    }
    .nav-links a:hover { background: var(--accent); color: #000; }
    
    .char-correct { color: var(--success); }
    .char-wrong { color: var(--error); background: rgba(255, 71, 87, 0.2); border-radius: 4px; }

    .game-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }

    .word-counts { display: flex; background: rgba(0,0,0,0.2); padding: 6px; border-radius: 18px; }
    .word-counts button { background: transparent; border: none; color: var(--muted); padding: 8px 18px; cursor: pointer; font-weight: 600; border-radius: 12px; }
    .word-counts button.active { background: var(--accent); color: #000; }

    .stats-bar { display: flex; gap: 15px; }
    .stat-pill { background: rgba(15, 23, 42, 0.6); padding: 12px 20px; border-radius: 20px; text-align: center; border: 1px solid var(--glass-border); min-width: 100px; }
    .stat-pill label { display: block; font-size: 10px; color: var(--muted); text-transform: uppercase; font-weight: 700; }
    .stat-pill span { color: var(--accent); font-weight: 800; font-size: 1.4rem; }
    
    .word-stream { 
      background: rgba(0,0,0,0.15); border-radius: 25px; padding: 40px; 
      height: 220px; display: flex; flex-wrap: wrap; gap: 15px; 
      font-size: 30px; line-height: 1.6; margin-bottom: 35px; overflow: hidden;
      border: 1px solid var(--glass-border);
    }

    .word { color: var(--muted); padding: 0 8px; border-radius: 8px; }
    .word.current { color: #fff; background: rgba(56, 189, 248, 0.15); border-bottom: 3px solid var(--accent); animation: pulse 1.5s infinite; }
    .word.correct { color: var(--success); }
    .word.wrong { color: var(--error); border-bottom: 3px solid var(--error); }

    .input-row { display: flex; gap: 20px; }
    input[type="text"] { 
      flex: 1; background: rgba(15, 23, 42, 0.8); border: 2px solid var(--glass-border); 
      border-radius: 20px; padding: 22px 30px; color: white; font-size: 20px; outline: none;
    }
    input[type="text"]:focus { border-color: var(--accent); }

    .btn { padding: 0 45px; border-radius: 20px; border: none; font-weight: 800; cursor: pointer; background: var(--accent); color: #000; text-transform: uppercase; }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(56, 189, 248, 0.3); }
    
    /* MODAL STATS */
    .modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px); display: none; justify-content: center; align-items: center; z-index: 9999; }
    .modal-content { background: #1e293b; padding: 50px; border-radius: 40px; text-align: center; border: 1px solid var(--accent); width: 90%; max-width: 500px; }
    .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 25px 0; }
    .res-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; border: 1px solid var(--glass-border); }
    .res-card label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
    .res-card span { font-size: 1.8rem; font-weight: 800; }

    footer { padding: 40px; text-align: center; width: 100%; border-top: 1px solid var(--glass-border); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
  </style>
</head>
<body>

<div class="container">
  <div class="main-card">
    <header>
      <div style="display:flex; align-items:center; gap:15px;">
        <img src="https://i.postimg.cc/9Qy6YWFZ/Chat-GPT-Image-Nov-27-2025-09-35-45-PM.png" width="40" style="border-radius:10px">
        <h1 style="margin:0; font-size:1.6rem; font-weight:800;">Typing<span style="color:var(--accent)">Master</span></h1>
      </div>
      <nav class="nav-links">
        <a href="account.html" id="userDisplayName">Hesab</a>
        <a href="haqqimizda.html">Haqqımızda</a>
      </nav>
    </header>

    <div class="game-options">
      <div class="word-counts" id="wordSelector">
        <button data-val="10">10</button>
        <button data-val="25" class="active">25</button>
        <button data-val="50">50</button>
        <button data-val="100">100</button>
      </div>
      <div class="stats-bar">
        <div class="stat-pill"><label>Sürət</label><span id="wpmDisplay">0</span></div>
        <div class="stat-pill"><label>Vaxt</label><span id="timerDisplay">0s</span></div>
      </div>
    </div>

    <div class="word-stream" id="wordBox"></div>

    <div class="input-row">
      <input type="text" id="mainInput" placeholder="BAŞLA düyməsinə klikləyin..." disabled autocomplete="off">
      <button class="btn" id="startAction">BAŞLA</button>
    </div>
  </div>
</div>

<div id="resultModal" class="modal">
  <div class="modal-content">
    <h2 style="margin:0; color: var(--accent);">Test Bitdi!</h2>
    
    <div style="margin: 20px 0;">
        <span id="finalWpm" style="font-size: 5rem; font-weight: 800; color: #fff; line-height: 1;">0</span>
        <p style="margin:0; color: var(--muted); letter-spacing: 3px;">WPM (Söz/Dəq)</p>
    </div>

    <div class="result-grid">
        <div class="res-card">
            <label>Düzgün</label>
            <span id="resCorrect" style="color: var(--success);">0</span>
        </div>
        <div class="res-card">
            <label>Səhv</label>
            <span id="resWrong" style="color: var(--error);">0</span>
        </div>
        <div class="res-card" style="grid-column: span 2;">
            <label>Ümumi Vaxt</label>
            <span id="resTime" style="color: var(--accent);">0s</span>
        </div>
    </div>

    <button class="btn" style="width:100%; padding: 20px;" onclick="location.reload()">YENİDƏN SINA</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCYWC8P0meXFbyRoSA4uHkJmJRkPFlhwSQ",
    authDomain: "salam-58d0a.firebaseapp.com",
    projectId: "salam-58d0a",
    storageBucket: "salam-58d0a.firebasestorage.app",
    messagingSenderId: "703442504339",
    appId: "1:703442504339:web:f9a6b1f54db80c4c829b66"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let state = { 
    words: [], 
    currentIdx: 0, 
    startTime: null, 
    isActive: false, 
    limit: 25, 
    timerInterval: null,
    correctCount: 0,
    wrongCount: 0 
  };

  const wordPool = "salam dünya kitab klaviatura sürət texnologiya məktəb həyat proqramist uğur gələcək internet məlumat inkişaf azərbaycan musiqi günəş ulduz dəniz qələm dəftər kompyuter sistem şəbəkə yazı sürətli dahi yaradıcı qüvvə fəza zaman məkan rəqəmsal kitabxana təhsil oyun platforma qabiliyyət məqsəd arzular".split(" ");

  const inputEl = document.getElementById("mainInput");
  const wordBox = document.getElementById("wordBox");

  onAuthStateChanged(auth, async (user) => {
    const email = user ? user.email : localStorage.getItem("tempEmail");
    if (email) {
      const q = query(collection(db, "melumatlar"), where("email", "==", email.toLowerCase()));
      const snap = await getDocs(q);
      if (!snap.empty) {
        document.getElementById("userDisplayName").innerText = snap.docs[0].data().name || email.split('@')[0];
      }
    }
  });

  document.getElementById("wordSelector").onclick = (e) => {
    if (e.target.tagName === "BUTTON") {
      document.querySelectorAll("#wordSelector button").forEach(btn => btn.classList.remove("active"));
      e.target.classList.add("active");
      state.limit = parseInt(e.target.dataset.val);
      resetGame();
    }
  };

  function resetGame() {
    state.isActive = false;
    state.currentIdx = 0;
    state.correctCount = 0;
    state.wrongCount = 0;
    clearInterval(state.timerInterval);
    inputEl.value = "";
    inputEl.disabled = true;
    document.getElementById("startAction").style.display = "block";
    document.getElementById("timerDisplay").innerText = "0s";
    document.getElementById("wpmDisplay").innerText = "0";
    generateWords();
  }

  function generateWords() {
    state.words = [];
    for(let i=0; i<state.limit; i++) {
        state.words.push(wordPool[Math.floor(Math.random() * wordPool.length)]);
    }
    wordBox.innerHTML = state.words.map((w, i) => `<span class="word ${i === 0 ? 'current' : ''}">${w}</span>`).join("");
    wordBox.scrollTop = 0;
  }

  inputEl.oninput = () => {
    if (!state.isActive) return;
    const typed = inputEl.value;
    const target = state.words[state.currentIdx];
    const currentWordEl = document.querySelectorAll(".word")[state.currentIdx];

    let coloredHTML = "";
    for (let i = 0; i < target.length; i++) {
      if (i < typed.length) {
        coloredHTML += `<span class="${typed[i] === target[i] ? 'char-correct' : 'char-wrong'}">${target[i]}</span>`;
      } else {
        coloredHTML += target[i];
      }
    }
    currentWordEl.innerHTML = coloredHTML;
  };

  inputEl.onkeydown = (e) => {
    if (e.key === " ") {
      e.preventDefault();
      const typed = inputEl.value.trim();
      if (!typed) return;

      const target = state.words[state.currentIdx];
      const wordEls = document.querySelectorAll(".word");
      
      if (typed === target) {
        wordEls[state.currentIdx].className = "word correct";
        state.correctCount++;
      } else {
        wordEls[state.currentIdx].className = "word wrong";
        state.wrongCount++;
      }

      state.currentIdx++;
      inputEl.value = "";
      
      if (state.currentIdx >= state.words.length) {
        finishGame();
      } else {
        wordEls[state.currentIdx].classList.add("current");
        if (wordEls[state.currentIdx].offsetTop > wordBox.offsetHeight + wordBox.scrollTop - 100) {
            wordBox.scrollTop += 50;
        }
      }
    }
  };

  function finishGame() {
    state.isActive = false;
    clearInterval(state.timerInterval);
    
    const finalSecs = Math.floor((Date.now() - state.startTime) / 1000);
    document.getElementById("finalWpm").innerText = document.getElementById("wpmDisplay").innerText;
    document.getElementById("resCorrect").innerText = state.correctCount;
    document.getElementById("resWrong").innerText = state.wrongCount;
    document.getElementById("resTime").innerText = finalSecs + "s";
    
    document.getElementById("resultModal").style.display = "flex";
  }

  document.getElementById("startAction").onclick = () => {
    state.isActive = true; 
    state.startTime = Date.now();
    inputEl.disabled = false; 
    inputEl.focus();
    document.getElementById("startAction").style.display = "none";
    
    state.timerInterval = setInterval(() => {
      if (!state.isActive) return;
      const elapsed = (Date.now() - state.startTime) / 1000;
      document.getElementById("timerDisplay").innerText = Math.floor(elapsed) + "s";
      // WPM Hesablanması
      const wpm = Math.round((state.correctCount) / (elapsed / 60)) || 0;
      document.getElementById("wpmDisplay").innerText = wpm;
    }, 1000);
  };

  generateWords();
</script>
</body>
</html>
